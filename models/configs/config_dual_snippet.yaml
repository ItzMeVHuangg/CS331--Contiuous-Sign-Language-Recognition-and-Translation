# ─────────────────────────────────────────────────────────────────────────────
# THÊM VÀO config.yaml (sau section "fusion")
# Dual-Stream CSLR settings
# ─────────────────────────────────────────────────────────────────────────────

dual_cslr:
  # ── Training phases ────────────────────────────────────────────────────────
  # Phase A: chỉ train Stream2 (Swin) + Fusion, Stream1 (ResNet34) bị freeze
  # Phase B: unfreeze toàn bộ, joint fine-tune với LR thấp hơn
  freeze_epochs: 15            # số epoch giữ Stream1 frozen (Phase A)

  # ── Loss weights ───────────────────────────────────────────────────────────
  # L_total = λ1*CTC_stream1 + λ2*CTC_stream2 + λ_fuse*CTC_fused
  #
  # Reasoning:
  #   - λ_fuse cao nhất: đây là output cuối cùng, tối ưu trực tiếp
  #   - λ1 trung bình: Stream1 đã tốt (24.84% WER), auxiliary loss giúp
  #                     backbone không bị catastrophic forgetting khi unfreeze
  #   - λ2 thấp nhất: Stream2 đang ở 43% WER, gradient quá mạnh có thể
  #                    làm nhiễu fusion layer
  lambda1:     0.3             # stream-1 auxiliary CTC weight
  lambda2:     0.1             # stream-2 auxiliary CTC weight
  lambda_fuse: 0.6             # fused CTC weight (primary output)

  # ── Fusion architecture ────────────────────────────────────────────────────
  fusion_nhead:   8            # MultiheadAttention heads (projection_size=256 phải chia hết)
  fusion_dropout: 0.2

  # ── CSLR training (override cfg.cslr nếu cần) ─────────────────────────────
  # Nếu không set ở đây, script sẽ dùng cfg["cslr"] như bình thường

