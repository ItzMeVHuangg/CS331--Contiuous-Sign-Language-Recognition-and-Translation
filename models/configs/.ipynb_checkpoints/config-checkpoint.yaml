
paths:
  phoenix_root:    "/CSLT/KHO_DU_LIEU/PHOENIX-2014-T-release-v3/PHOENIX-2014-T"
  frames_root:     "/CSLT/KHO_DU_LIEU/PHOENIX-2014-T-release-v3/PHOENIX-2014-T/features/fullFrame-210x260px"
  annot_root:      "/CSLT/KHO_DU_LIEU/PHOENIX-2014-T-release-v3/PHOENIX-2014-T/annotations/manual"
  checkpoint_dir:  "checkpoints"
  log_dir:         "logs"

# ─── DATA ────────────────────────────────────────────────────
data:
  img_height: 112
  img_width:  112
  num_workers: 4
  pin_memory: true

  # Frame sampling
  max_frames: 256          # max frames per clip (pad/truncate)
  temporal_stride: 1       # sample every N-th frame
  augmentation:
    random_crop: true
    horizontal_flip: 0.5   # probability
    color_jitter:
      brightness: 0.3
      contrast: 0.3
      saturation: 0.1
    random_erasing: 0.2

# ─── CNN BACKBONE ─────────────────────────────────────────────
cnn:
  backbone: "resnet18"     # resnet18 | resnet50 | vgg11
  pretrained: true
  freeze_bn: false
  out_features: 512        # feature dim after pooling
  
cnn_3d:
  backbone: "r3d_18"      # r3d_18 | r2plus1d_18 | mc3_18
  clip_len: 16             # frames per 3D clip
  clip_stride: 16 
# ─── BiLSTM + CTC (CSLR) ──────────────────────────────────────
cslr:
  hidden_size: 512         # BiLSTM hidden units per direction
  num_layers: 2            # number of BiLSTM layers
  dropout: 0.3
  projection_size: 256     # linear projection before CTC head
  ctc_blank_idx: 0         # blank token index

  # Training
  batch_size: 4
  num_epochs: 20
  learning_rate: 1.0e-4
  lr_scheduler: "cosine"   # cosine | step | plateau
  warmup_epochs: 5
  weight_decay: 1.0e-4
  gradient_clip: 5.0

  # CTC decode
  beam_width: 10
  lm_weight: 0.0           # 0 = no LM; set >0 for language model fusion

# ─── LATE FUSION ──────────────────────────────────────────────
fusion:
  mode: "concat"             # concat | add | attention
  visual_dim: 512          # from CNN last hidden
  gloss_embed_dim: 256     # gloss embedding dim
  fused_dim: 512           # output of fusion layer
  dropout: 0.2

# ─── TRANSFORMER TRANSLATOR (SLT) ─────────────────────────────
slt:
  d_model: 512
  nhead: 8
  num_encoder_layers: 3
  num_decoder_layers: 3
  dim_feedforward: 2048
  dropout: 0.1
  max_seq_len: 300          # max target sentence length

  # Training
  batch_size: 4
  num_epochs: 20
  learning_rate: 1.0e-4
  lr_scheduler: "cosine"
  warmup_steps: 1000
  weight_decay: 1.0e-4
  label_smoothing: 0.1
  gradient_clip: 1.0

# ─── HYPERPARAMETER TUNING (Optuna) ───────────────────────────
hpo:
  n_trials: 50
  timeout: 36000           # seconds (10h)
  sampler: "tpe"           # tpe | random | cmaes
  pruner: "hyperband"
  direction: "minimize"    # minimize WER for CSLR

  search_space:
    learning_rate:  [1.0e-5, 1.0e-3]
    hidden_size:    [256, 512, 1024]
    num_layers:     [1, 2, 3]
    dropout:        [0.1, 0.5]
    batch_size:     [2, 4, 8]
    weight_decay:   [1.0e-5, 1.0e-3]